<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./../css/consultation_option.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>consulation</title>
</head>

<body>
    <div class="card mb-3 bg-transparent" style="width: 100%;">
        <div class="row g-0">
            <div class="col-md-4">
                <img src="./../images/freepik-export-20240918111827FadE.jpeg" class="img-fluid rounded-start" alt="...">
            </div>
            <div class="col-md-5 ps-5 ms-5">
                <div class="card-body pt-4">
                    <h5 class="card-title fw-bold fs-2 text-primary  mt-3 mb-3">Dr. Sophie Martin</h5>
                    <p class="card-text fw-bold fs-3 text-success  mt-3 mb-3"> Généraliste</p>
                    <div class="pt-4 fs-5">
                        <p class="d-inline fw-bold text-success">7 ans d'expérience</p>
                        <p class="d-inline ms-5 fw-bold text-success">n°consultation: 320</p>
                    </div>
                    <div class="pt-4 fs-5">
                        <p class="d-inline fw-bold text-success">
                            <i class='bx bxs-clinic'></i>
                            Hopital general
                        </p>
                        <p class="d-inline ms-5 fw-bold text-success">
                            <i class='bx bxs-location-plus'></i>
                            Yaoundé
                        </p>
                    </div>
                </div>
            </div>

            <div class="consulter">
                <h2 class="pb-4 pt-5 text-center text-white fw-bold">Faites vous consulter par notre spécialiste:</h2>
                <div class="text-center mt-4">
                    <a href="#" class="me-5 p-2 rounded">
                        <i class='bx bx-video'></i>
                        Appel video
                    </a>
                    <a href="#" class="ms-5 p-2 rounded">
                        <i class='bx bx-phone-call'></i>
                        Appel audio
                    </a>
                </div>
            </div>
            <div class="prise_rendezvous pt-5">
                <h2 class="pb-4 text-white fw-bold">Calendrier des Rendez-vous:</h2> 
                <!-- Filtrage par médecin -->
                <div id="doctor-filter">   
                </div>
            
                <!-- Calendrier -->
                <table id="calendar">
                    <thead>
                        <tr>
                            <th>Heure</th>
                            <th>Lundi</th>
                            <th>Mardi</th>
                            <th>Mercredi</th>
                            <th>Jeudi</th>
                            <th>Vendredi</th>
                        </tr>
                    </thead>
                    <tbody id="calendar-body">
                        <!-- Les horaires seront générés par JavaScript -->
                    </tbody>
                </table>
            
                <!-- Formulaire de Réservation -->
                <h2 class="pb-4 pt-4 text-white fw-bold">Réserver un Rendez-vous</h2>
                <form id="appointment-form" class="pb-5">
        
                    <div>
                        <label for="doctor" class="fw-bold p-3">Médecin:</label>
                        <select id="doctor"  class="p-2" required>
                            <option value="Dr. Smith">Dr. Smith</option>
                        </select><br>
                    </div>
                    <div>
                        <label for="day" class="fw-bold p-3">Jour:</label>
                        <select id="day" required>
                            <option value="lundi">Lundi</option>
                            <option value="mardi">Mardi</option>
                            <option value="mercredi">Mercredi</option>
                            <option value="jeudi">Jeudi</option>
                            <option value="vendredi">Vendredi</option>
                        </select><br>
                    </div>
                    
                    <div>
                        <label for="time" class="fw-bold p-3">Heure:</label>
                        <input type="time" id="time" required><br>
                    </div>
                    <button type="submit" class="text-center p-3">Réserver</button>
                </form>
            </div> 
        </div>
 
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const calendarBody = document.getElementById('calendar-body');
            const appointmentForm = document.getElementById('appointment-form');
            const doctorFilter = document.getElementById('doctor-filter');
            
            const doctors = ['Dr. Smith'];
            const days = ['lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi'];
            const times = ['09:00', '10:00', '11:00', '12:00', '14:00', '15:00', '16:00'];
        
            // Objet pour stocker les rendez-vous
            let appointments = [];
        
            // Générer le calendrier vide avec les horaires
            function generateCalendar() {
                times.forEach(time => {
                    const row = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.textContent = time;
                    row.appendChild(timeCell);
                    
                    days.forEach(day => {
                        const dayCell = document.createElement('td');
                        dayCell.setAttribute('data-day', day);
                        dayCell.setAttribute('data-time', time);
                        dayCell.textContent = ''; // Initialement vide
                        row.appendChild(dayCell);
        
                        // Ajout de l'événement pour annuler un rendez-vous
                        dayCell.addEventListener('click', function() {
                            handleCellClick(dayCell);
                        });
                    });
        
                    calendarBody.appendChild(row);
                });
            }
        
            // Ajouter un rendez-vous
            function addAppointment(doctor, day, time) {
                const appointment = {
                    doctor,
                    day,
                    time
                };
                appointments.push(appointment);
                displayAppointments();
            }
        
            // Annuler un rendez-vous
            function cancelAppointment(day, time) {
                appointments = appointments.filter(appointment => appointment.day !== day || appointment.time !== time);
                displayAppointments();
            }
        
            // Afficher les rendez-vous
            function displayAppointments(filterDoctor = 'all') {
                // D'abord, vider le calendrier
                document.querySelectorAll('#calendar td').forEach(cell => {
                    if (cell.getAttribute('data-day')) {
                        cell.textContent = '';
                        cell.classList.remove('booked');
                    }
                });
        
                // Remplir les cases du calendrier avec les rendez-vous
                appointments.forEach(appointment => {
                    if (filterDoctor === 'all' || appointment.doctor === filterDoctor) {
                        const cell = document.querySelector(
                            `td[data-day="${appointment.day}"][data-time="${appointment.time}"]`
                        );
                        if (cell) {
                            cell.textContent = appointment.doctor;
                            cell.classList.add('booked');
                        }
                    }
                });
            }
        
            // Gérer le clic sur une cellule pour annuler un rendez-vous
            function handleCellClick(cell) {
                const day = cell.getAttribute('data-day');
                const time = cell.getAttribute('data-time');
        
                if (cell.classList.contains('booked')) {
                    const confirmation = confirm("Voulez-vous annuler ce rendez-vous ?");
                    if (confirmation) {
                        cancelAppointment(day, time);
                    }
                }
            }
        
            // Filtrer les rendez-vous par médecin
            doctorFilter.addEventListener('change', function () {
                const selectedDoctor = doctorFilter.value;
                displayAppointments(selectedDoctor);
            });
        
            // Valider si l'heure est déjà réservée
            function isTimeSlotAvailable(day, time) {
                return !appointments.some(appointment => appointment.day === day && appointment.time === time);
            }
        
            // Soumettre le formulaire de réservation
            appointmentForm.addEventListener('submit', function (e) {
                e.preventDefault();
        
                const doctor = document.getElementById('doctor').value;
                const day = document.getElementById('day').value;
                const time = document.getElementById('time').value;
        
                // Validation : Vérifier si le créneau est déjà pris
                if (!isTimeSlotAvailable(day, time)) {
                    alert("Ce créneau est déjà réservé. Veuillez en choisir un autre.");
                    return;
                }
        
                addAppointment(doctor, day, time);
        
                appointmentForm.reset();
            });
        
            // Générer le calendrier au chargement de la page
            generateCalendar();
        });
        

    </script>
</body>

</html>
