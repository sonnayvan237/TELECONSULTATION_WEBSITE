<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>soumission d'ordonnace</title>
    <link rel="stylesheet" href="./../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="submit">
        <div class="doc_add">
            <label for="formFileLg" class="form-label fw-bold fs-2">Ajouter l'ordonnance du médecin</label>
            <input class="form-control form-control-lg" id="formFileLg" type="file">
        </div>
        <div class="pt-3">
            <label class="form-label fw-bold fs-2">Decriverz le(s) examen(s) que vous souhaitez faire: </label>
            <div class="doc_add">
                <p class="fw-bold fs-2">ou</p>
                <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2" style="height: 100px"></textarea>
                <label for="floatingTextarea2"></label>
            </div>
        </div>
    
        <div class="col-auto doc_add">
            <button type="submit" class="btn btn-primary mb-3 pt-3 pb-3 ps-4 pe-4 fw-bold fs-5">Soumetre</button>
        </div> 
    </div>
    
</body>
</html>
