<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="form-box">
        <div class="register-container" id="register">
            <div class="top">
                <h1>Sign Up</h1>
            </div>
            <div class="two-forms">
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Firstname">
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Lastname">
                    <i class='bx bxs-user'></i>
                </div>
            </div>
            <div class="two-forms">
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Spécialités">
                    <i class='bx bxs-briefcase'></i>
                </div>
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Numéro portable">
                    <i class='bx bx-phone-call'></i>
                </div>
            </div>
            <div class="input-box">
                <input type="text" class="input-field" placeholder="Code postal cabinet">
                <i class='bx bx-envelope' ></i>
            </div>
            <div class="input-box">
                <input type="text" class="input-field" placeholder="Email">
                <i class='bx bx-envelope' ></i>
            </div>
            <div class="input-box">
                <input type="password" class="input-field" placeholder="Password">
                <i class='bx bx-lock-alt'></i>
            </div>
            <div class="two-cols">
                <div class="one">
                    <input type="checkbox" id="register-check">
                    <label for="register-check">Remember Me</label>
                </div>
            </div>
            <div class="input-box">
                <button type="submit" class="btn" ><a href="#">Register</a></button>
            </div>
            <div class="two">
                <label><p>Have an account?<a href="./../LOGIN/login.html" onclick="login()">Login</a></p></label>
            </div>
        </div>
    </div>
</body>
</html>
