<div class="card mb-3 bg-transparent" style="width: 100%;">
    <div class="row g-0">
        <div class="col-md-4">
            <img src="./../images/freepik-export-20240918111827FadE.jpeg" class="img-fluid rounded-start" alt="...">
        </div>
        <div class="col-md-5 ps-5 ms-5">
            <div class="card-body pt-4">
                <h5 class="card-title fw-bold fs-2 text-primary  mt-3 mb-3">Dr. Sophie Martin</h5>
                <p class="card-text fw-bold fs-3 text-success  mt-3 mb-3"> Généraliste</p>
                <div class="pt-4 fs-5">
                    <p class="d-inline fw-bold text-success">7 ans d'expérience</p>
                    <p class="d-inline ms-5 fw-bold text-success">n°consultation: 320</p>
                </div>
                <div class="pt-4 fs-5">
                    <p class="d-inline fw-bold text-success">
                        <i class='bx bxs-clinic'></i>
                        Hopital general
                    </p>
                    <p class="d-inline ms-5 fw-bold text-success">
                        <i class='bx bxs-location-plus'></i>
                        Yaoundé
                    </p>
                </div>
            </div>
        </div>

        <div class="consulter">
            <h2 class="pb-4 pt-5 text-center text-white fw-bold">Faites vous consulter par notre spécialiste:</h2>
            <div class="text-center mt-4">
                <a href="#" class="me-5 p-2 rounded">
                    <i class='bx bx-video'></i>
                    Appel video
                </a>
                <a href="#" class="ms-5 p-2 rounded">
                    <i class='bx bx-phone-call'></i>
                    Appel audio
                </a>
            </div>
        </div>
        <div class="prise_rendezvous pt-5">
            <h2 class="pb-4 text-white fw-bold">Calendrier des Rendez-vous:</h2> 
            <!-- Filtrage par médecin -->
            <div id="doctor-filter">   
            </div>
        
            <!-- Calendrier -->
            <table id="calendar">
                <thead>
                    <tr>
                        <th>Heure</th>
                        <th>Lundi</th>
                        <th>Mardi</th>
                        <th>Mercredi</th>
                        <th>Jeudi</th>
                        <th>Vendredi</th>
                    </tr>
                </thead>
                <tbody id="calendar-body">
                    <!-- Les horaires seront générés par JavaScript -->
                </tbody>
            </table>
        
            <!-- Formulaire de Réservation -->
            <h2 class="pb-4 pt-4 text-white fw-bold">Réserver un Rendez-vous</h2>
            <form id="appointment-form" class="pb-5">
    
                <div>
                    <label for="doctor" class="fw-bold">Médecin:</label>
                    <select id="doctor" required>
                        <option value="Dr. Smith" class="fw-bold">Dr. Smith</option>
                    </select><br>
                </div>
                <div>
                    <label for="day" class="fw-bold">Jour:</label>
                    <select id="day" class="fw-bold" required>
                        <option value="lundi">Lundi</option>
                        <option value="mardi">Mardi</option>
                        <option value="mercredi">Mercredi</option>
                        <option value="jeudi">Jeudi</option>
                        <option value="vendredi">Vendredi</option>
                    </select><br>
                </div>
                
                <div>
                    <label for="time" class="fw-bold">Heure:</label>
                    <input type="time" id="time" class="fw-bold"><br>
                </div>
                <button type="submit" class="text-center fw-bold p-2">Réserver</button>
            </form>
        </div> 
    </div>

</div>
